services:
  db:
    image: postgres:15-alpine
    container_name: personal_analytics_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgrespassword}
      POSTGRES_DB: ${POSTGRES_DB:-personal_analytics}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ${POSTGRES_DB:-personal_analytics}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      default:
      shared_agent_network:
        aliases:
          - postgres-db

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: personal_analytics_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgrespassword}@db:5432/${POSTGRES_DB:-personal_analytics}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
    volumes:
      - ./backups:/app/backups
      - ./uploads:/app/uploads
    networks:
      - default
      - shared_agent_network
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: personal_analytics_frontend
    restart: always
    ports:
      - "127.0.0.1:8501:8501"
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    volumes:
      - ./uploads:/app/uploads

  telegram_bot:
    build:
      context: .
      dockerfile: telegram_bot/Dockerfile
    container_name: personal_analytics_bot
    restart: always
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - REMINDER_HOUR=${REMINDER_HOUR:-21}
      - BACKEND_URL=http://backend:8000
      - PYTHONUNBUFFERED=1
    depends_on:
      - backend
    volumes:
      - ./uploads:/app/uploads

  caddy:
    image: caddy:2-alpine
    container_name: personal_analytics_proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    environment:
      - BASIC_AUTH_HASH=${BASIC_AUTH_HASH}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend

volumes:
  postgres_data:
  caddy_data:
  caddy_config:

networks:
  shared_agent_network:
    external: true

